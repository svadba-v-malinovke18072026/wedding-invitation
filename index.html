<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Свадебное приглашение | Андрей и Надежда</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== ГЛОБАЛЬНЫЕ СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5EDE2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-family: 'Inter', 'Arial', sans-serif;
        }

        /* ========== ОСНОВНОЙ КОНТЕЙНЕР ========== */
        .invitation {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: #FFFCF8;
            overflow: hidden;
        }

        /* ========== ОБЩИЕ СТИЛИ ДЛЯ КАРТИНОК ========== */
        .slice {
            width: 100%;
            display: block;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* ========== БЛОК 2: ПРИГЛАШЕНИЕ И КАЛЕНДАРЬ ========== */

        /* ========== БЛОК 3: ТАЙМЕР ДО СВАДЬБЫ ========== */
        .timer-wrapper {
            position: relative;
            width: 100%;
        }

        .timer-wrapper img {
            width: 100%;
            display: block;
        }

        /* Плашка с таймером (накладывается поверх Slice 3.png) */
        .timer-card {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            transform: translateY(-50%);
            background: #523C31;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0.8rem;
        }

        .timer-title {
            font-size: 0.9rem;
            letter-spacing: 2px;
            color: #F2E0C9;
            margin-bottom: 0.3rem;
        }

        .timer-digits {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .timer-item {
            text-align: center;
        }

        .timer-number {
            font-size: 50px;
            font-weight: 700;
            color: #F2E0C9;
            font-family: monospace;
        }

        .timer-label {
            font-size: 0.6rem;
            color: #DCC29E;
            text-transform: uppercase;
        }

        /* ========== БЛОК 4: МЕСТО ПРОВЕДЕНИЯ И КНОПКА С КАРТОЙ ========== */
        .place-wrapper {
            position: relative;
            width: 100%;
        }
        /* Кнопка с картой (накладывается поверх Slice 4.png) */
        .address-card {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: #008000;
            text-align: center;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0px;
            white-space: nowrap;
            padding: 10px 24px;
            top: -25px;
            height: auto;
            width: auto;
            min-width: 550px;
        }

        .address-card a {
            color: #F2E0C9;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        /* ========== АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ ========== */
        @media (max-width: 480px) {
            .timer-number {
                font-size: 28px;
            }
            .timer-digits {
                gap: 1rem;
            }
            .address-card {
                top: -20px;
                min-width: 280px;
                padding: 6px 12px;
            }
            .address-card a {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="invitation">
    
    <!-- ============================================ -->
    <!-- БЛОК 1: ЗАГОЛОВОК "НАКОНЕЦ-ТО МЫ ЖЕНИМСЯ"    -->
    <!-- ============================================ -->
    <img class="slice" src="Slice 1.png" alt="Заголовок: наконец-то мы женимся">
    
    <!-- ============================================ -->
    <!-- БЛОК 2: ПРИГЛАШЕНИЕ И КАЛЕНДАРЬ             -->
    <!-- ============================================ -->
    <img class="slice" src="Slice 2.png" alt="Приглашение и календарь на июль">
    
    <!-- ============================================ -->
    <!-- БЛОК 3: ТАЙМЕР ДО СВАДЬБЫ                   -->
    <!-- ============================================ -->
    <div class="timer-wrapper">
        <!-- Фоновая картинка для таймера -->
        <img src="Slice 3.png" alt="Фон для таймера">
        
        <!-- Плашка с таймером (поверх фона) -->
        <div class="timer-card">
            <div class="timer-title">ДО НАШЕЙ ВСТРЕЧИ ОСТАЛОСЬ</div>
            <div class="timer-digits">
                <div class="timer-item">
                    <div class="timer-number" id="days">00</div>
                    <div class="timer-label">дней</div>
                </div>
                <div class="timer-item">
                    <div class="timer-number" id="hours">00</div>
                    <div class="timer-label">часов</div>
                </div>
                <div class="timer-item">
                    <div class="timer-number" id="minutes">00</div>
                    <div class="timer-label">минут</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ============================================ -->
    <!-- БЛОК 4: МЕСТО ПРОВЕДЕНИЯ И КАРТА            -->
    <!-- ============================================ -->
    <div class="place-wrapper">
        <!-- Фоновая картинка с адресом и дресс-кодом -->
        <img src="Slice 4.png" alt="Место проведения: коттедж Ля Покровка, дресс-код">
        
        <!-- Кнопка с картой (поверх фона) -->
        <div class="address-card">
            <a href="https://go.2gis.com/1XghJ" target="_blank">
                <i class="fas fa-map-marker-alt"></i> Посмотреть на карте
            </a>
        </div>
    </div>
    
</div>

<!-- ========== СКРИПТ ТАЙМЕРА ========== -->
<script>
    function updateTimer() {
        // Дата свадьбы: 18 июля 2026 года
        const weddingDate = new Date(2026, 6, 18, 0, 0, 0);
        const now = new Date();
        const diff = weddingDate - now;
        
        if (diff <= 0) {
            document.getElementById('days').innerText = '00';
            document.getElementById('hours').innerText = '00';
            document.getElementById('minutes').innerText = '00';
            return;
        }
        
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);
        
        document.getElementById('days').innerText = days.toString().padStart(2, '0');
        document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
        document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
    }
    
    // Запускаем таймер
    updateTimer();
    // Обновляем каждую минуту
    setInterval(updateTimer, 60000);
</script>
</body>
</html>
