<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Свадебное приглашение | Живой таймер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #F5EDE2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            font-family: 'Inter', 'Arial', sans-serif;
        }

        .invitation {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: #FFFCF8;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
        }

        .slice {
            width: 100%;
            display: block;
        }

        img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ===== ВЕРХНЯЯ ПЛАШКА С ТАЙМЕРОМ ===== */
        .timer-wrapper {
            position: relative;
            width: 100%;
        }

        .timer-wrapper img {
            width: 100%;
            display: block;
        }

        .timer-card {
            position: absolute;
            top: 17%;
            left: 0;
            width: 100%;
            transform: translateY(-50%);
            background: #523C31;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5%;
        }

        .timer-title {
            font-size: clamp(0.7rem, 4vw, 0.9rem);
            letter-spacing: 2px;
            color: #F2E0C9;
            margin-bottom: 2%;
        }

        .timer-digits {
            display: flex;
            gap: 8%;
            justify-content: center;
        }

        .timer-item {
            text-align: center;
        }

        .timer-number {
            font-size: clamp(1.8rem, 8vw, 50px);
            font-weight: 700;
            color: #F2E0C9;
            font-family: monospace;
        }

        .timer-label {
            font-size: clamp(0.5rem, 3vw, 0.7rem);
            color: #DCC29E;
            text-transform: uppercase;
        }

        /* ===== КНОПКА КАРТЫ ===== */
        .address-card {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: #523C31;
            text-align: center;
            box-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0px;
            white-space: nowrap;
            padding: 2% 5%;
            top: 82%;
            height: auto;
            width: 90%;
            min-width: auto;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .address-card:hover {
            opacity: 0.9;
        }

        .address-card a {
            color: #F2E0C9;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: clamp(0.7rem, 3.5vw, 0.9rem);
            width: 100%;
            height: 100%;
            justify-content: center;
        }

        /* Стили для кнопок внутри Slice 5 */
        .slice-5-wrapper {
            position: relative;
            width: 100%;
        }

        .slice-5-wrapper img {
            width: 100%;
            display: block;
        }

        /* Кнопка анкеты (в верхней части Slice 5) */
        .anketa-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: #523C31;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            padding: 1.7% 5%;
            width: 74%;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(242,224,201,0.4);
            top: 1.2%;
        }

        .anketa-btn a {
            color: #F2E0C9;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(0.75rem, 4vw, 1rem);
            letter-spacing: 0.5px;
            width: 100%;
            justify-content: center;
        }

        .anketa-btn i {
            font-size: 1.1em;
        }

        .anketa-btn:hover {
            background: #6e4f3f;
            transform: translateX(-50%) scale(1.02);
        }

        /* Кнопка "Найди себя" (в самом низу Slice 5) */
        .findme-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            background: #DCC29E;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            padding: 1.7% 5%;
            width: 39%;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 5;
            border: none;
            bottom: 18.9%;
        }

        .findme-btn a {
            color: #3A2A21;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(0.75rem, 4vw, 1rem);
            letter-spacing: 0.5px;
            width: 100%;
            justify-content: center;
        }

        .findme-btn i {
            font-size: 1.1em;
        }

        .findme-btn:hover {
            background: #e9d3b0;
            transform: translateX(-50%) scale(1.02);
        }

        /* ===== ТОЛЬКО ТЕЛЕФОН (адаптация ширины кнопок и позиций) ===== */
        @media (max-width: 480px) {
            /* Кнопка анкеты — шире, чтобы не уезжала */
            .anketa-btn {
                width: 86%;
                padding: 2% 5%;
                top: 1%;
            }
            
            /* Кнопка "Найди себя" — шире (чтобы не уезжала), позиция та же */
            .findme-btn {
                width: 40%;
                padding: 2% 5%;
                bottom: 17%;
            }
            
            /* Кнопка карты — чуть шире, позицию не трогаем */
            .address-card {
                top: 80.9%;
                width: 88%;
                padding: 1.5% 4%;
            }
        }

        /* Для совсем узких экранов (320-380px) */
        @media (max-width: 380px) {
            .anketa-btn {
                width: 90%;
                top: 0.8%;
            }
            .findme-btn {
                width: 65%;
                bottom: 15.5%;
            }
            .address-card {
                width: 92%;
            }
        }
    </style>
</head>
<body>
<div class="invitation">
    <!-- Slice 1 -->
    <img class="slice" src="Slice 1.png" alt="наконец-то мы женимся">
    
    <!-- Slice 2 -->
    <img class="slice" src="Slice 2.png" alt="приглашение и календарь">
    
    <!-- Slice 3 с таймером и кнопкой карты -->
    <div class="timer-wrapper">
        <img src="Slice 3.png" alt="таймер фон">
        <div class="timer-card">
            <div class="timer-title">ДО НАШЕЙ ВСТРЕЧИ ОСТАЛОСЬ</div>
            <div class="timer-digits">
                <div class="timer-item">
                    <div class="timer-number" id="days">00</div>
                    <div class="timer-label">дней</div>
                </div>
                <div class="timer-item">
                    <div class="timer-number" id="hours">00</div>
                    <div class="timer-label">часов</div>
                </div>
                <div class="timer-item">
                    <div class="timer-number" id="minutes">00</div>
                    <div class="timer-label">минут</div>
                </div>
            </div>
        </div>
        <!-- Вся плашка кликабельна -->
        <div class="address-card" onclick="window.open('https://go.2gis.com/1XghJ', '_blank')">
            <a href="javascript:void(0)">
                <i class="fas fa-map-marker-alt"></i> Посмотреть на карте
            </a>
        </div>
    </div>
    
    <!-- Slice 4 -->
    <img class="slice" src="Slice 4.png" alt="адрес фон">

    <!-- Slice 5 с КНОПКОЙ АНКЕТЫ (вверху) и КНОПКОЙ НАЙДИ СЕБЯ (внизу) -->
    <div class="slice-5-wrapper">
        <img src="Slice 5.png" alt="ваши фото">
        <!-- Кнопка анкеты (ссылка на форму) расположена в верхней части -->
        <div class="anketa-btn" onclick="window.open('https://forms.gle/43Xx38hsGT723tGV6', '_blank')">
            <a href="javascript:void(0)">
                <i class="fas fa-pen-alt"></i> Заполнить анкету
            </a>
        </div>
        <!-- Кнопка заглушка "Найди себя" в самом низу -->
        <div class="findme-btn" onclick="alert('Скоро здесь появится ссылка на архив с фотографиями! Следите за обновлениями :)')">
            <a href="javascript:void(0)">
                <i class="fas fa-camera"></i> Найди себя
            </a>
        </div>
    </div>
</div>

<script>
    function updateTimer() {
        // Дата свадьбы: 18 июля 2026, 00:00:00 (можно изменить время, если нужно)
        const weddingDate = new Date(2026, 6, 18, 0, 0, 0);
        const now = new Date();
        const diff = weddingDate - now;

        if (diff <= 0) {
            document.getElementById('days').innerText = '00';
            document.getElementById('hours').innerText = '00';
            document.getElementById('minutes').innerText = '00';
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (86400000)) / 3600000);
        const minutes = Math.floor((diff % 3600000) / 60000);

        document.getElementById('days').innerText = days.toString().padStart(2, '0');
        document.getElementById('hours').innerText = hours.toString().padStart(2, '0');
        document.getElementById('minutes').innerText = minutes.toString().padStart(2, '0');
    }

    updateTimer();
    setInterval(updateTimer, 60000);
</script>
</body>
</html>
